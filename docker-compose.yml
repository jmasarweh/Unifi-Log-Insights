services:
  unifi-log-insight:
    #image: ghcr.io/jmasarweh/unifi-log-insight:3.1.0-beta.2
    build: .
    pull_policy: always
    container_name: log-insight-local
    restart: unless-stopped
    ports:
      - "514:514/udp"
      - "8090:8000"
    volumes:
      - pgdata:/var/lib/postgresql/data      # Not needed when using external DB
      - ./maxmind:/app/maxmind
    # If you add real credentials here, do not commit this file.
    env_file:
    - .env
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

volumes:
  pgdata:
    name: unifi-log-insight-pgdata
